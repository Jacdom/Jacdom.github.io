  product:
    eyebrow: "产品设计 / 自发概念研究"
    lead: "一款围绕单手放置、可见线缆秩序与可移动充电动作设计的模块化桌面底座。"
    overview_label: "项目概览"
    overview_title: "一个实体产品概念，而不是单纯的渲染练习。"
    fact_project: "项目"
    fact_category: "类别"
    fact_category_value: "消费电子 / 实体产品"
    fact_year: "年份"
    fact_role: "角色"
    fact_role_value: "工业设计 / CMF / 交互概念"
    fact_duration: "周期"
    fact_duration_value: "概念开发阶段"
    fact_objective: "目标"
    fact_objective_value: "简化日常放置、充电与线缆整理动作。"
    background_label: "项目背景 / 设计假设"
    background_title: "充电产品解决了电量问题，却经常在桌面上制造新的摩擦。"
    background_text: "这项自发研究从可观察的日常状况出发，而不声称拥有真实用户研究：松散线缆、对位不确定、充电部件固定，以及配件在视觉上与设备互相竞争。"
    problem_1_title: "配置分散"
    problem_1_text: "底座、充电盘与线缆经常表现为三个独立物件。"
    problem_2_title: "放置不明确"
    problem_2_text: "用户需要寻找正确的充电位置。"
    problem_3_title: "线缆路径隐藏"
    problem_3_text: "线缆整理往往只在最后才被考虑。"
    problem_4_title: "硬件用途单一"
    problem_4_text: "固定的充电部件无法跟随用户移动。"
    strategy_label: "设计策略"
    strategy_title: "让每项功能在解释之前就能被看懂。"
    principle_1_title: "一个主导姿态"
    principle_1_text: "低矮底座与一条上升弧线共同建立产品轮廓。"
    principle_2_title: "功能区域可见"
    principle_2_text: "放置区、充电盘与线缆路径保持清晰区分。"
    principle_3_title: "克制的桌面存在感"
    principle_3_text: "产品的视觉重量始终低于被承托的设备。"
    principle_4_title: "模块化维护逻辑"
    principle_4_text: "电源模块与线缆载体被设想为可分离部件。"
    concept_label: "概念与形态发展"
    concept_title: "从桌面上的物件，变成桌面的一部分。"
    concept_text: "通过视觉重量、操作通达性、功能层级与轮廓比较三种数字体块方向。最终 ARC 方向降低高度，同时保持每项交互清晰可见。"
    interaction_label: "功能与交互"
    interaction_title: "三个动作组织完整体验。"
    interaction_text: "放置设备、在需要移动电源时拿起充电盘，并通过外露路径整理线缆。不增加隐藏模式或装饰性交互。"
    cmf_label: "CMF 设计"
    cmf_title: "材质对比用于区分触摸、结构与品牌个性。"
    cmf_text: "提案中的 CMF 系统区分结构外壳、柔性接触区域与充电界面。石墨黑是主方向；银色与工作室紫展示同一形态如何支持不同品牌定位。"
    cmf_note: "材料与表面处理均为概念提案，需要进一步工程验证。"
    structure_label: "结构与细节"
    structure_title: "分层装配让视觉外壳与功能载体保持独立。"
    structure_text: "概念由外壳、内部载体、倾斜支架、可移动充电盘、线缆盒与防滑底组成。这是设计架构，不是工程规格。"
    structure_note: "紧固件、电子元件、公差、热管理与制造可行性不在本概念范围内。"
    iteration_label: "原型与迭代"
    iteration_title: "数字比例研究暴露出真正重要的设计决策。"
    iteration_1_title: "降低垂直压迫感"
    iteration_1_text: "塔式方向节省面积，却在视觉上与设备竞争。"
    iteration_2_title: "分离功能区域"
    iteration_2_text: "桥式方向让使用更清楚，但后部体量仍然多余。"
    iteration_3_title: "打开产品轮廓"
    iteration_3_text: "ARC 方向降低底座、开放线缆入口，并让充电盘更容易识别。"
    final_label: "最终设计"
    final_title: "一个低矮平台、一条上升弧线，以及清晰可见的交互焦点。"
    final_text: "最终概念在空置时保持安静；当设备、充电盘或线缆进入系统时，使用方式立即变得清楚。"
    context_caption: "仅用于展示空间关系与使用顺序的概念情境，并非实物原型摄影。"
    outcome_label: "结果 / 设计价值"
