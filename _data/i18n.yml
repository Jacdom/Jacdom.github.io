  product:
    eyebrow: "Product Design / Self-initiated Concept Study"
    lead: "A modular desktop dock designed around one-hand placement, visible cable order, and a removable charging gesture."
    overview_label: "Project overview"
    overview_title: "A physical product concept, not a rendering exercise."
    fact_project: "Project"
    fact_category: "Category"
    fact_category_value: "Consumer electronics / Physical product"
    fact_year: "Year"
    fact_role: "Role"
    fact_role_value: "Industrial design / CMF / Interaction concept"
    fact_duration: "Duration"
    fact_duration_value: "Concept development phase"
    fact_objective: "Objective"
    fact_objective_value: "Simplify the daily dock, charge, and cable-routing ritual."
    background_label: "Background / Design hypothesis"
    background_title: "Charging products solve power, but often create a new layer of desk friction."
    background_text: "This self-initiated study starts from observable everyday conditions rather than claimed user research: loose cables, uncertain alignment, fixed charging parts, and accessories that compete visually with the device."
    problem_1_title: "Scattered setup"
    problem_1_text: "A dock, puck, and cable often behave as separate objects."
    problem_2_title: "Unclear placement"
    problem_2_text: "The user must search for the correct charging position."
    problem_3_title: "Hidden cable path"
    problem_3_text: "Cable routing is treated as an afterthought."
    problem_4_title: "Single-use hardware"
    problem_4_text: "A fixed charging component cannot move with the user."
    strategy_label: "Design strategy"
    strategy_title: "Make every function readable before it is explained."
    principle_1_title: "One dominant gesture"
    principle_1_text: "A low base and one rising arc establish the product silhouette."
    principle_2_title: "Visible functional zones"
    principle_2_text: "Dock, puck, and cable route remain visually distinct."
    principle_3_title: "Calm desk presence"
    principle_3_text: "The product stays below the visual weight of the device."
    principle_4_title: "Modular service logic"
    principle_4_text: "The power element and cable carrier are conceived as separable parts."
    concept_label: "Concept & form development"
    concept_title: "From object on the desk to part of the desk."
    concept_text: "Three digital massing directions were compared through visual weight, access, functional hierarchy, and silhouette. The selected ARC direction reduces height while keeping each interaction visible."
    interaction_label: "Function & Interaction"
    interaction_title: "Three gestures organize the experience."
    interaction_text: "Place the device, lift the puck when power needs to move, and route the cable through an exposed path. No hidden mode or decorative interaction is added."
    cmf_label: "CMF design"
    cmf_title: "Material contrast clarifies touch, structure, and brand character."
    cmf_text: "The proposed CMF system separates the structural shell, soft contact areas, and charging interface. Graphite is the primary direction; silver and studio purple demonstrate how the same form can support different brand positions."
    cmf_note: "Material and finish selections are concept proposals and require engineering validation."
    structure_label: "Structure & detail"
    structure_title: "A layered assembly keeps the visual shell separate from functional carriers."
    structure_text: "The concept separates an outer shell, internal carrier, angled support, removable puck, cable cassette, and non-slip foot. This is a design architecture, not an engineering specification."
    structure_note: "Fasteners, electronics, tolerances, thermal behavior, and manufacturing feasibility remain outside this concept scope."
    iteration_label: "Prototype & iteration"
    iteration_title: "Digital proportion studies exposed the decisions that mattered."
    iteration_1_title: "Reduce vertical dominance"
    iteration_1_text: "The tower direction saved area but competed visually with the device."
    iteration_2_title: "Separate functional zones"
    iteration_2_text: "The bridge direction clarified use but left unnecessary rear mass."
    iteration_3_title: "Open the silhouette"
    iteration_3_text: "The ARC direction lowered the base, exposed cable access, and made the puck legible."
    final_label: "Final design"
    final_title: "A low platform, one rising arc, and a visible point of interaction."
    final_text: "The final concept is intentionally quiet when empty and immediately understandable when a device, puck, or cable enters the system."
    context_caption: "Concept context only: spatial relationship and use sequence, not a photographed prototype."
    outcome_label: "Outcome / Design value"
    outcome_title: "A coherent product platform for use, recognition, and launch storytelling."
    outcome_text: "The concept consolidates three desk rituals, gives each function a visible place, and creates a silhouette that can remain recognizable across CMF variants and commercial imagery."
    outcome_note: "No sales, market, or user-performance claims are attached to this self-initiated concept."
    related_label: "Related work"
    related_title: "From product definition to product desire."
