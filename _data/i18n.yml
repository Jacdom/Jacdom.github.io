zh:
  nav:
    home: "首页"
    price: "价格"
    case: "案例"
    web: "网页设计"
    ai: "AI"
    connect: "联系"
  home:
    hero_eyebrow: "DTDT Studio / Design Team Dream Team"
    hero_title: "为品牌打造面向视觉文化与 AI 时代的设计系统。"
    hero_lead: "我们以克制、清晰、可商业化的设计流程，完成品牌视觉、产品图像、电商页面与 AI 辅助工作流。"
    view_work: "查看案例"
    explore_ai: "探索 AI"
    selected_work: "精选作品"
    selected_title: "既有视觉方向，也有可持续扩展的系统结构。"
    all_cases: "全部案例"
    ai_eyebrow: "AI 设计实践"
    ai_title: "AI 是创意工作层，不是廉价视觉捷径。"
    ai_text: "我们的 AI 工作连接视觉探索、提示词系统、产品渲染与可复用生产流程，让迭代更快，同时保留更强的美术判断和设计系统。"
    web_eyebrow: "数字体验"
    web_title: "把品牌系统转化为清晰商业路径的网页设计。"
    web_text: "从高端品牌官网、电商独立站到 Amazon 旗舰店，我们设计层级清晰、比例完整、面向转化的响应式页面体验。"
    web_cta: "查看网页设计"
    capabilities: "设计能力"
    capabilities_title: "从品牌识别到内容生产，每个输出都应属于同一个系统。"
    philosophy: "设计理念"
    philosophy_title: "先有设计判断，再用 AI 加速。"
    philosophy_text_1: "DTDT Studio 构建让产品更可信、更精致、更适合市场传播的视觉系统。我们结合品牌策略、商业意识、图像工艺和 AI 增强流程，让团队在快速推进时不牺牲审美。"
    philosophy_text_2: "Explore Forever 意味着持续探索新工具，同时保护设计中最重要的部分：准确的判断。"
    final_eyebrow: "从系统开始"
    final_title: "为下一次发布建立更锋利的品牌视觉。"
  ai:
    title: "用 AI 工作流提升视觉系统质量与创意决策速度。"
    body: "DTDT Studio 将 AI 作为设计研究与生产层：探索视觉可能性、建立可复用流程，并帮助品牌在产品、活动与电商触点中形成更一致的图像系统。"
    cta: "讨论 AI 项目"
    practice: "实践方向"
    practice_title: "五个让 AI 真正增强设计流程的方向。"
    track_visual_title: "AI 视觉探索"
    track_visual_text: "在正式生产前快速建立图像方向、情绪系统、活动视觉和受控视觉研究。"
    track_workflow_title: "AI 工作流"
    track_workflow_text: "建立可复用提示词结构、评审流程、选图标准与生产交付规范，提高创意交付效率。"
    track_render_title: "AI 辅助产品渲染"
    track_render_text: "用人工美术指导控制概念渲染、场景变化、材质方向与产品叙事。"
    track_auto_title: "创意自动化"
    track_auto_text: "为高频设计任务建立批量构思、内容变体、视觉质检与轻量自动化流程。"
    track_system_title: "设计系统 + AI"
    track_system_text: "将品牌规则、视觉 token、提示词库和资产生成逻辑组织成一个统一系统。"
    method: "方法"
    method_title: "探索只有被编辑成系统，才真正有用。"
    method_text_1: "我们从清晰的视觉假设开始，生成受控方向，用品牌和商业目标评估结果，再将最强方案转化为可复用提示词、美术指导说明和生产级资产。"
    method_text_2: "这是一种有选择的工作方式。AI 扩大选项，设计判断决定什么真正属于品牌。"
  web:
    title: "面向高端品牌、电商团队与 AI 辅助发布的网页设计。"
    lead: "我们设计让品牌更容易被理解、信任和购买的数字体验。"
    start: "启动网页设计项目"
    services_title: "为品牌清晰度与商业转化而设计。"
    services_text: "每个页面都被视为一个视觉系统：信息层级、响应式结构、产品证明和转化路径需要一起规划。"
    cases: "交互案例"
    cases_title: "三种网页设计方向，同一套高标准视觉系统。"
    tab_brand: "高端品牌官网"
    tab_ecommerce: "电商独立站"
    tab_amazon: "亚马逊旗舰店首页"
    case_brand_title: "高端品牌官网"
    case_brand_text: "克制的品牌官网结构：电影感首屏、品牌故事、高级排版与清晰咨询 CTA。"
    case_ecommerce_title: "电商独立站网页设计"
    case_ecommerce_text: "面向转化的商品页面路径：卖点模块、场景图、用户评价、购买意图与清晰结账路径。"
    case_amazon_title: "亚马逊旗舰店首页设计"
    case_amazon_text: "适配平台的旗舰店首页：分类导航、主推产品区、场景化模块、品牌故事与促销活动区。"
    final_title: "为下一次活动规划一套可延展的网站系统。"
