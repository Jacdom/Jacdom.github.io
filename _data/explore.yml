tips:
  - number: "01"
    category: "Commerce"
    category_key: "tips.category_commerce"
    title: "Design the decision, not the decoration."
    title_key: "tips.tip_1_title"
    summary: "Every section should answer a buying question: What is it, why is it better, can I trust it, and what should I do next?"
    summary_key: "tips.tip_1_summary"
    practice: "Map product proof, differentiators, objections, and CTA order before choosing a visual treatment."
    practice_key: "tips.tip_1_practice"
  - number: "02"
    category: "Hierarchy"
    category_key: "tips.category_hierarchy"
    title: "Give each viewport one dominant message."
    title_key: "tips.tip_2_title"
    summary: "A clear focal point helps people scan, understand, and act without negotiating with every element on the page."
    summary_key: "tips.tip_2_summary"
    practice: "Use a blur or squint test: the headline, product, and next action should remain obvious."
    practice_key: "tips.tip_2_practice"
  - number: "03"
    category: "Product imagery"
    category_key: "tips.category_imagery"
    title: "Show proof before atmosphere."
    title_key: "tips.tip_3_title"
    summary: "Mood attracts attention, but scale, material, function, detail, and use context reduce purchase uncertainty."
    summary_key: "tips.tip_3_summary"
    practice: "Sequence a clean product view first, then detail, use, scale, comparison, and lifestyle imagery."
    practice_key: "tips.tip_3_practice"
  - number: "04"
    category: "Systems"
    category_key: "tips.category_systems"
    title: "Turn repeated decisions into rules."
    title_key: "tips.tip_4_title"
    summary: "A visual system protects quality when a brand expands across formats, markets, products, and teams."
    summary_key: "tips.tip_4_summary"
    practice: "Define tokens, type roles, spacing, image behavior, components, content patterns, and states together."
    practice_key: "tips.tip_4_practice"
  - number: "05"
    category: "Interaction"
    category_key: "tips.category_interaction"
    title: "Favor recognition over recall."
    title_key: "tips.tip_5_title"
    summary: "Visible choices, familiar language, and immediate feedback reduce memory load and make interfaces feel predictable."
    summary_key: "tips.tip_5_summary"
    practice: "Keep options discoverable, show system status, and place guidance beside the decision that needs it."
    practice_key: "tips.tip_5_practice"
  - number: "06"
    category: "Accessibility"
    category_key: "tips.category_accessibility"
    title: "Design every state, not only the default."
    title_key: "tips.tip_6_title"
    summary: "Focus, hover, loading, error, empty, reduced-motion, keyboard, zoom, and reflow states are part of the product."
    summary_key: "tips.tip_6_summary"
    practice: "Check contrast, focus visibility, target size, semantic order, 200% zoom, and motion preferences early."
    practice_key: "tips.tip_6_practice"
  - number: "07"
    category: "Motion"
    category_key: "tips.category_motion"
    title: "Animate cause and effect."
    title_key: "tips.tip_7_title"
    summary: "Useful motion explains hierarchy, continuity, or response. Movement without information competes with the content."
    summary_key: "tips.tip_7_summary"
    practice: "Use one focal movement, short timing, transform and opacity where possible, plus a reduced-motion alternative."
    practice_key: "tips.tip_7_practice"
  - number: "08"
    category: "3D & AI"
    category_key: "tips.category_3d_ai"
    title: "Explore broadly, then edit with constraints."
    title_key: "tips.tip_8_title"
    summary: "Whether rendering or generating, quality comes from accurate form, material logic, controlled references, and deliberate rejection."
    summary_key: "tips.tip_8_summary"
    practice: "Define proportions, material behavior, brand rules, use context, and rejection criteria before producing variants."
    practice_key: "tips.tip_8_practice"

