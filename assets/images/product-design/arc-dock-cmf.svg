<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ARC Dock CMF proposals</title>
  <desc id="desc">Three proposed color, material, and finish directions: graphite, soft silver, and studio purple.</desc>
  <defs><linearGradient id="silver" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f4f4f1"/><stop offset="1" stop-color="#8f918d"/></linearGradient><linearGradient id="graphite"><stop stop-color="#444"/><stop offset="1" stop-color="#101010"/></linearGradient></defs>
  <rect width="1600" height="900" fill="#f2f1ed"/>
  <g font-family="Arial, Helvetica, sans-serif"><text x="64" y="72" fill="#171717" font-size="18" font-weight="700">CMF DESIGN / PROPOSED MATERIAL DIRECTIONS</text><text x="1372" y="72" fill="#6f6f6a" font-size="14">01-03</text></g>
  <line x1="64" y1="104" x2="1536" y2="104" stroke="#d9d9d4"/>
  <g transform="translate(64 156)" font-family="Arial, Helvetica, sans-serif">
    <rect width="456" height="590" fill="#fff"/>
    <g transform="translate(48 108)"><rect x="0" y="164" width="360" height="155" rx="70" fill="url(#graphite)"/><path d="M92 192L170 28H278L318 193Z" fill="#777975"/><circle cx="292" cy="224" r="52" fill="#171717" stroke="#f26b46" stroke-width="13"/></g>
    <text x="28" y="50" fill="#171717" font-size="14" font-weight="700">GRAPHITE / SIGNAL ORANGE</text><circle cx="30" cy="538" r="12" fill="#171717"/><circle cx="64" cy="538" r="12" fill="#777975"/><circle cx="98" cy="538" r="12" fill="#f26b46"/>
    <text x="128" y="544" fill="#6f6f6a" font-size="13">Anodized shell / matte polymer / TPE</text>
  </g>
  <g transform="translate(572 156)" font-family="Arial, Helvetica, sans-serif">
    <rect width="456" height="590" fill="#fff"/>
    <g transform="translate(48 108)"><rect x="0" y="164" width="360" height="155" rx="70" fill="url(#silver)"/><path d="M92 192L170 28H278L318 193Z" fill="#e2e2de" stroke="#aaa"/><circle cx="292" cy="224" r="52" fill="#f5f5f2" stroke="#ffa81c" stroke-width="13"/></g>
    <text x="28" y="50" fill="#171717" font-size="14" font-weight="700">SOFT SILVER / WARM GOLD</text><circle cx="30" cy="538" r="12" fill="#d7d8d4"/><circle cx="64" cy="538" r="12" fill="#f5f5f2"/><circle cx="98" cy="538" r="12" fill="#ffa81c"/>
    <text x="128" y="544" fill="#6f6f6a" font-size="13">Bead-blast finish / soft-touch insert</text>
  </g>
