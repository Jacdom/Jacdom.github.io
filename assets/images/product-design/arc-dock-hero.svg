    <radialGradient id="puck"><stop offset="0" stop-color="#ffa81c"/><stop offset=".66" stop-color="#f26b46"/><stop offset="1" stop-color="#9f43d1"/></radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>
  <rect width="1600" height="1100" fill="#f2f1ed"/>
