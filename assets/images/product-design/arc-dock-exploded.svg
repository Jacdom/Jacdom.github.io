<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">ARC Dock exploded structure concept</title>
  <desc id="desc">An exploded diagram of the outer shell, internal carrier, angled support, charging puck, cable cassette, and non-slip foot.</desc>
  <rect width="1600" height="1000" fill="#fff"/>
  <g font-family="Arial, Helvetica, sans-serif"><text x="64" y="72" fill="#171717" font-size="18" font-weight="700">STRUCTURE &amp; DETAIL / CONCEPT ASSEMBLY</text><text x="1350" y="72" fill="#6f6f6a" font-size="14">NOT ENGINEERING DATA</text></g>
  <line x1="64" y1="104" x2="1536" y2="104" stroke="#d9d9d4"/>
  <line x1="800" y1="160" x2="800" y2="890" stroke="#9f43d1" stroke-width="2" stroke-dasharray="9 10"/>
  <g transform="translate(470 140)">
    <path d="M180 134L258 0H402L465 134Z" fill="#c3c4c0" stroke="#777" stroke-width="3"/>
    <text x="530" y="80" font-family="Arial" font-size="14" fill="#171717">01 / ANGLED SUPPORT</text><line x1="458" y1="75" x2="510" y2="75" stroke="#171717"/>
  </g>
  <g transform="translate(470 330)">
    <rect x="0" y="0" width="660" height="185" rx="84" fill="#c0c1bd"/>
    <text x="715" y="88" font-family="Arial" font-size="14" fill="#171717">02 / OUTER SHELL</text><line x1="658" y1="84" x2="695" y2="84" stroke="#171717"/>
  </g>
  <g transform="translate(500 558)">
    <rect x="0" y="0" width="600" height="145" rx="66" fill="#171717"/>
    <rect x="42" y="44" width="210" height="55" rx="27" fill="#353535"/>
    <circle cx="492" cy="73" r="55" fill="#ffa81c" stroke="#9f43d1" stroke-width="14"/>
    <text x="655" y="55" font-family="Arial" font-size="14" fill="#171717">03 / INTERNAL CARRIER</text><text x="655" y="83" font-family="Arial" font-size="14" fill="#6f6f6a">04 / REMOVABLE PUCK</text><line x1="598" y1="67" x2="635" y2="67" stroke="#171717"/>
  </g>
  <g transform="translate(540 760)">
    <rect x="0" y="0" width="520" height="75" rx="36" fill="#6f6f6a"/>
    <path d="M60 38H460" stroke="#f26b46" stroke-width="7" stroke-linecap="round"/>
    <text x="575" y="28" font-family="Arial" font-size="14" fill="#171717">05 / CABLE CASSETTE</text><text x="575" y="56" font-family="Arial" font-size="14" fill="#6f6f6a">06 / NON-SLIP FOOT</text><line x1="518" y1="38" x2="555" y2="38" stroke="#171717"/>
  </g>
  <g font-family="Arial" font-size="13" fill="#6f6f6a"><text x="64" y="936">Assembly logic is directional only. Fasteners, tolerances, electronics, and thermal behavior require engineering development.</text></g>
</svg>
